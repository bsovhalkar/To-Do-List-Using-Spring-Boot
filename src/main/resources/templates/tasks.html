<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>To-Do Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .todo-card{
            width:500px;
            border-radius:15px;
        }

        .task-completed{
            text-decoration: line-through;
            color: gray;
        }

        .task-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .task-title{
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="card shadow-lg p-4 todo-card">

    <h2 class="text-center mb-4">📝 To-Do Application</h2>

    <form action="/" method="post" class="d-flex gap-2 mb-4">

        <input
                type="text"
                name="title"
                class="form-control"
                placeholder="Add a new task..."
                required>

        <button class="btn btn-primary">
            Add
        </button>

    </form>


    <ul class="list-group">

        <li
                class="list-group-item task-row"
                th:each="task : ${tasks}"
        >

            <div class="d-flex align-items-center gap-2">

                <input
                        type="checkbox"
                        th:checked="${task.completed}"
                        th:onchange="|window.location.href='/' + ${task.id} + '/toggle'|">

                <span
                        class="task-title"
                        th:text="${task.title}"
                        th:classappend="${task.completed} ? ' task-completed' : ''">
</span>

            </div>

            <div>

                <a
                        th:href="@{/{id}/delete(id=${task.id})}"
                        class="btn btn-sm btn-danger">
                    Delete
                </a>

            </div>

        </li>

    </ul>

</div>

</body>
</html>
